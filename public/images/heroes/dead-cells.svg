<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1e1a"/>
      <stop offset="100%" style="stop-color:#1e120d"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <text x="600" y="310" font-family="system-ui,sans-serif" font-size="36" font-weight="700" fill="rgba(255,255,255,0.85)" text-anchor="middle">Dead Cells</text>
  <text x="600" y="360" font-family="system-ui,sans-serif" font-size="16" fill="rgba(255,255,255,0.4)" text-anchor="middle">action combat scene in a dark castle with pixel art style</text>
  <text x="600" y="400" font-family="system-ui,sans-serif" font-size="12" fill="rgba(102,192,244,0.5)" text-anchor="middle">SteamPulse</text>
</svg>