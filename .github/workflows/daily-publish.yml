name: Daily Content Generation

on:
  schedule:
    - cron: '0 1 * * *' # UTC 1:00 = Beijing 9:00
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max articles to generate'
        required: false
        default: '10'
      mode:
        description: 'Pipeline mode'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - content-only
          - build-only

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run pipeline
        run: |
          npx tsx scripts/orchestrate.ts \
            --mode ${{ github.event.inputs.mode || 'full' }} \
            --limit ${{ github.event.inputs.limit || '10' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}

      - name: Commit new content
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add src/content/ public/images/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: auto-generate content $(date +'%Y-%m-%d')"
          git push

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generate-logs
          path: logs/
          retention-days: 7
